<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TeamRevenue - HubSpot Growth Architecture</title>
    <!-- Modern Tech Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="data.js"></script>
    <style>
        :root { 
            --hs-orange: #ff7a59;
            --hs-orange-glow: rgba(255, 122, 89, 0.6);
            --tr-dark-bg: #0b1320; /* Deep slate blue */
            --tr-teal: #00bda5;
            --tr-glass: rgba(11, 19, 32, 0.45);
            --tr-glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif;
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 10% 20%, #15243b 0%, var(--tr-dark-bg) 90%);
            color: #ffffff;
        }

        /* Frosted Glass Header */
        .glass-header {
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            background: var(--tr-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--tr-glass-border);
            z-index: 10;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #ffffff, #a8b8d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        .header-subtitle {
            margin-left: 15px;
            padding-left: 15px;
            border-left: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
            font-weight: 400;
            color: #8fa0ba;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* SVG Canvas */
        #canvas-wrapper {
            flex: 1; /* Takes remaining height dynamically */
            width: 100%;
            position: relative;
        }

        #canvas { 
            width: 100%; 
            height: 100%; 
            cursor: grab; 
        }
        #canvas:active { cursor: grabbing; }
        
        .node { cursor: pointer; }
        
        .node circle { 
            fill: var(--tr-dark-bg); 
            stroke: var(--hs-orange); 
            stroke-width: 3px; 
            transition: all 0.4s ease;
        }
        .node circle:hover { 
            fill: var(--hs-orange);
            filter: drop-shadow(0 0 8px var(--hs-orange-glow));
        }
        
        .node text { 
            font-size: 14px; 
            fill: #e1e7f0; 
            font-weight: 600; 
            pointer-events: none; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        /* Styles for individual article nodes */
        .node--leaf text { 
            pointer-events: auto; 
            font-weight: 400;
            fill: #a2b2c9; 
            transition: all 0.2s ease;
        }
        
        .node--leaf text:hover { 
            fill: #ffffff; 
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }
        
        .node--leaf circle {
            stroke: var(--tr-teal);
            stroke-width: 2.5px;
        }
        .node--leaf circle:hover {
            fill: var(--tr-teal);
            filter: drop-shadow(0 0 8px rgba(0, 189, 165, 0.6));
        }

        .link { 
            fill: none; 
            stroke: rgba(255,255,255,0.15); 
            stroke-width: 2px; 
            transition: stroke 0.3s ease;
        }
        
        /* Search Bar */
        .search-container {
            margin-left: auto;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 280px;
            padding: 10px 18px;
            border-radius: 20px;
            border: 1px solid var(--tr-glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .search-input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--tr-teal);
            box-shadow: 0 0 10px rgba(0, 189, 165, 0.3), inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .search-input::placeholder {
            color: #8fa0ba;
        }
    </style>
</head>
<body>

<!-- Premium Branding Header -->
<div class="glass-header">
    <h1 class="header-title">TeamRevenue</h1>
    <span class="header-subtitle">Growth Architect Protocol • Knowledge Base Mapping</span>
    <div class="search-container">
        <input type="text" id="semantic-search" class="search-input" placeholder="Search concepts (e.g. 'churn')...">
    </div>
</div>

<div id="canvas-wrapper">
    <svg id="canvas"></svg>
</div>

<script>
    if (typeof sheetData === 'undefined') {
        alert("CRITICAL ERROR: 'data.js' is missing! Please ensure the Python script has generated the latest data wrapper.");
    } else {
        const rawData = d3.csvParse(sheetData.trim());
        const data = rawData.filter(d => d.Parent && d.Name).map(d => {
            d.Name = d.Name.replace(/<\/?[^>]+(>|$)/g, "").replace(/&quot;/g, '"').replace(/&#39;/g, "'");
            return d;
        });

        const svg = d3.select("#canvas");
        const g = svg.append("g");
        const wrapper = document.getElementById('canvas-wrapper');
        
        let semanticDict = {};
        
        fetch('dictionary.json')
            .then(res => {
                if (res.ok) return res.json();
                return {};
            })
            .then(dict => {
                semanticDict = dict;
            })
            .catch(err => console.error("Error loading dictionary:", err));
            
        const searchInput = document.getElementById('semantic-search');
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            handleSearch(query);
        });

        function handleSearch(query) {
            if (!query) {
                root.descendants().forEach(d => d.isHighlighted = false);
                update(root);
                return;
            }

            let targets = [];
            for (let [key, arr] of Object.entries(semanticDict)) {
                if (key.toLowerCase().includes(query)) {
                    targets = targets.concat(arr.map(t => t.toLowerCase()));
                }
            }
            if (targets.length === 0) targets.push(query);

            root.descendants().forEach(d => d.isHighlighted = false);

            function searchTree(node) {
                let isMatch = targets.some(target => node.data.name.toLowerCase().includes(target));
                let hasMatchingDescendant = false;

                const children = node.children || node._children;
                if (children) {
                    children.forEach(child => {
                        if (searchTree(child)) {
                            hasMatchingDescendant = true;
                        }
                    });
                }

                if (isMatch) node.isHighlighted = true;

                if (hasMatchingDescendant || isMatch) {
                    if (node._children) {
                        node.children = node._children;
                        node._children = null;
                    }
                    return true;
                }
                return false;
            }

            searchTree(root);
            update(root);
        }
        
        // Setup Zoom and Panning
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        const tree = d3.tree().nodeSize([50, 450]);
        let root;
        let i = 0; 

        const vpMapping = {
            "LEADERSHIP": ["Executive Strategy"],
            "REVOPS": ["Data Governance", "Revenue Insights", "Portal Health & Security"],
            "MARKETING": ["Marketing Leadership", "Frontline Managers", "Marketing Ops", "Demand Gen", "Content Execution"],
            "SALES": ["Sales Leadership", "Frontline Managers", "Sales Ops", "Field Sales (Outside)", "Inside Sales (SDR/BDR)", "Enablement"],
            "CUSTOMER SUCCESS": ["CS Leadership", "Frontline Managers", "Service Ops", "Agent Enablement", "Retention Strategy"],
            "API": ["Authentication & Limits", "CRM APIs", "Automation & Webhooks", "CMS & Site APIs"]
        };

        const nestedData = { name: "HUBSPOT CORE", children: [] };
        Object.keys(vpMapping).forEach(vp => {
            const vpNode = { name: vp, children: [] };
            vpMapping[vp].forEach(dir => {
                const articles = data.filter(d => d.Parent === dir).map(d => ({ name: d.Name, url: d.URL }));
                if (articles.length > 0) {
                    vpNode.children.push({ name: dir, children: articles });
                }
            });
            nestedData.children.push(vpNode);
        });

        root = d3.hierarchy(nestedData);
        root.x0 = wrapper.clientHeight / 2; 
        root.y0 = 0;

        function collapseDeep(d) {
            if (d.children) {
                d._children = d.children;
                d._children.forEach(collapseDeep);
                d.children = null;
            }
        }

        if (root.children) {
            root.children.forEach(collapseDeep);
        }

        update(root);
        
        // Dynamically calculate center based on wrapper dimensions
        const initialScale = 0.85;
        const startX = wrapper.clientWidth * 0.15; // Start 15% from left
        const startY = wrapper.clientHeight / 2;
        svg.call(zoom.transform, d3.zoomIdentity.translate(startX, startY).scale(initialScale));

        function toggle(d) {
            if (d.children) { 
                d._children = d.children; 
                d.children = null; 
            } else { 
                d.children = d._children; 
                d._children = null; 
            }
        }

        function diagonal(s, d) {
            return `M ${d.y} ${d.x}
                    C ${(s.y + d.y) / 2} ${d.x},
                      ${(s.y + d.y) / 2} ${s.x},
                      ${s.y} ${s.x}`;
        }

        function update(source) {
            tree(root);
            const nodes = root.descendants();
            const links = root.links();

            const node = g.selectAll("g.node").data(nodes, d => d.id || (d.id = ++i));
            
            const nodeEnter = node.enter().append("g")
                .attr("class", d => "node" + (!d.children && !d._children ? " node--leaf" : ""))
                .attr("transform", d => `translate(${source.y0},${source.x0})`)
                .on("click", (e, d) => {
                    if (!d.children && !d._children && d.data.url) { 
                        window.open(d.data.url, "_blank"); 
                    } else if (d.children || d._children) { 
                        toggle(d); 
                        update(d); 
                    }
                });

            nodeEnter.append("circle")
                .attr("r", 1e-6);

            nodeEnter.append("text")
                .attr("dy", ".35em")
                .attr("x", d => d.children || d._children ? -18 : 18)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .text(d => d.data.name)
                .style("fill-opacity", 1e-6);

            const nodeUpdate = nodeEnter.merge(node);
            nodeUpdate.transition()
                .duration(600)
                .attr("transform", d => `translate(${d.y},${d.x})`);

            nodeUpdate.select("circle")
                .attr("r", 10)
                .style("stroke", d => d.isHighlighted ? "var(--tr-teal)" : null)
                .style("fill", d => d.isHighlighted ? "var(--tr-teal)" : null)
                .style("filter", d => d.isHighlighted ? "drop-shadow(0 0 10px rgba(0, 189, 165, 0.8))" : null);

            nodeUpdate.select("text")
                .style("fill-opacity", 1)
                .style("fill", d => d.isHighlighted ? "#ffffff" : null)
                .style("font-weight", d => d.isHighlighted ? "800" : null)
                .style("text-shadow", d => d.isHighlighted ? "0 0 10px rgba(255,255,255,0.8)" : null)
                .attr("x", d => d.children || d._children ? -18 : 18)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start");
            
            const nodeExit = node.exit().transition()
                .duration(500)
                .attr("transform", d => `translate(${source.y},${source.x})`)
                .remove();

            nodeExit.select("circle").attr("r", 1e-6);
            nodeExit.select("text").style("fill-opacity", 1e-6);

            const link = g.selectAll("path.link").data(links, d => d.target.id);
            
            const linkEnter = link.enter().insert("path", "g")
                .attr("class", "link")
                .attr("d", d => diagonal({x: source.x0, y: source.y0}, {x: source.x0, y: source.y0}));

            const linkUpdate = linkEnter.merge(link);
            linkUpdate.transition()
                .duration(600)
                .attr("d", d => diagonal(d.source, d.target));

            link.exit().transition()
                .duration(500)
                .attr("d", d => diagonal({x: source.x, y: source.y}, {x: source.x, y: source.y}))
                .remove();

            nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
        }
    }
</script>
</body>
</html>
