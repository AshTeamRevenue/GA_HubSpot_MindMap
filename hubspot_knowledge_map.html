<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TeamRevenue - HubSpot Growth Architecture</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230b1320%22 stroke=%22%2300bda5%22 stroke-width=%225%22/><text x=%2250%22 y=%2268%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2250%22 fill=%22%23ff7a59%22 text-anchor=%22middle%22>TR</text></svg>">
    <!-- Modern Tech Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="data.js"></script>
    <style>
        :root { 
            --hs-orange: #ff7a59;
            --hs-orange-glow: rgba(255, 122, 89, 0.6);
            --tr-dark-bg: #0b1320; 
            --tr-teal: #00bda5;
            --tr-glass: rgba(11, 19, 32, 0.45);
            --tr-glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif;
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 10% 20%, #15243b 0%, var(--tr-dark-bg) 90%);
            color: #ffffff;
        }

        /* Frosted Glass Header */
        .glass-header {
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            background: var(--tr-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--tr-glass-border);
            z-index: 10;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .header-title {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            background: linear-gradient(90deg, #ffffff, #a8b8d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        .header-subtitle {
            margin-left: 15px;
            padding-left: 15px;
            border-left: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
            font-weight: 400;
            color: #8fa0ba;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #canvas-wrapper {
            flex: 1; 
            width: 100%;
            position: relative;
        }

        #canvas { 
            width: 100%; 
            height: 100%; 
            cursor: grab; 
        }
        #canvas:active { cursor: grabbing; }
        
        .node { cursor: pointer; }
        
        .node circle { 
            fill: var(--tr-dark-bg); 
            stroke: var(--hs-orange); 
            stroke-width: 3px; 
            transition: all 0.4s ease;
        }
        .node circle:hover { 
            fill: var(--hs-orange);
            filter: drop-shadow(0 0 8px var(--hs-orange-glow));
        }
        
        .node text { 
            font-size: 14px; 
            fill: #e1e7f0; 
            font-weight: 600; 
            pointer-events: none; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        .node--leaf text { 
            pointer-events: auto; 
            font-weight: 400;
            fill: #a2b2c9; 
            transition: all 0.2s ease;
        }
        
        .node--leaf text:hover { 
            fill: #ffffff; 
            text-shadow: 0 0 8px rgba(255,255,255,0.4);
        }
        
        .node--leaf circle {
            stroke: var(--tr-teal);
            stroke-width: 2.5px;
        }
        .node--leaf circle:hover {
            fill: var(--tr-teal);
            filter: drop-shadow(0 0 8px rgba(0, 189, 165, 0.6));
        }

        .link { 
            fill: none; 
            stroke: rgba(255,255,255,0.15); 
            stroke-width: 2px; 
            transition: stroke 0.3s ease;
        }
    </style>
</head>
<body>

<div class="glass-header">
    <h1 class="header-title">TeamRevenue</h1>
    <span class="header-subtitle">Growth Architect Protocol • Knowledge Base Mapping</span>
</div>

<div id="canvas-wrapper">
    <svg id="canvas"></svg>
</div>

<script>
    if (typeof sheetData === 'undefined') {
        alert("CRITICAL ERROR: 'data.js' is missing! Please ensure the Python script has generated the latest data wrapper.");
    } else {
        const rawData = d3.csvParse(sheetData.trim());
        const data = rawData.filter(d => d.Parent && d.Name);

        const svg = d3.select("#canvas");
        const g = svg.append("g");
        const wrapper = document.getElementById('canvas-wrapper');
        
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        const tree = d3.tree().nodeSize([50, 450]);
        let root;
        let i = 0; 

        const vpMapping = {
            "LEADERSHIP": ["Executive Strategy"],
            "REVOPS": ["Data Governance", "Revenue Insights", "Portal Health & Security"],
            "MARKETING": ["Marketing Leadership", "Frontline Managers", "Marketing Ops", "Demand Gen", "Content Execution"],
            "SALES": ["Sales Leadership", "Frontline Managers", "Sales Ops", "Field Sales (Outside)", "Inside Sales (SDR/BDR)", "Enablement"],
            "CUSTOMER SUCCESS": ["CS Leadership", "Frontline Managers", "Service Ops", "Agent Enablement", "Retention Strategy"]
        };

        const nestedData = { name: "HUBSPOT CORE", children: [] };
        Object.keys(vpMapping).forEach(vp => {
            const vpNode = { name: vp, children: [] };
            vpMapping[vp].forEach(dir => {
                const articles = data.filter(d => d.Parent === dir).map(d => ({ name: d.Name, url: d.URL }));
                if (articles.length > 0) {
                    vpNode.children.push({ name: dir, children: articles });
                }
            });
            nestedData.children.push(vpNode);
        });

        root = d3.hierarchy(nestedData);
        root.x0 = wrapper.clientHeight / 2; 
        root.y0 = 0;

        function collapseDeep(d) {
            if (d.children) {
                d._children = d.children;
                d._children.forEach(collapseDeep);
                d.children = null;
            }
        }

        if (root.children) {
            root.children.forEach(collapseDeep);
        }

        update(root);
        
        const initialScale = 0.85;
        const startX = wrapper.clientWidth * 0.15; 
        const startY = wrapper.clientHeight / 2;
        svg.call(zoom.transform, d3.zoomIdentity.translate(startX, startY).scale(initialScale));

        function toggle(d) {
            if (d.children) { 
                d._children = d.children; 
                d.children = null; 
            } else { 
                d.children = d._children; 
                d._children = null; 
            }
        }

        function diagonal(s, d) {
            return `M ${d.y} ${d.x}
                    C ${(s.y + d.y) / 2} ${d.x},
                      ${(s.y + d.y) / 2} ${s.x},
                      ${s.y} ${s.x}`;
        }

        function update(source) {
            tree(root);
            const nodes = root.descendants();
            const links = root.links();

            const node = g.selectAll("g.node").data(nodes, d => d.id || (d.id = ++i));
            
            const nodeEnter = node.enter().append("g")
                .attr("class", d => "node" + (!d.children && !d._children ? " node--leaf" : ""))
                .attr("transform", d => `translate(${source.y0},${source.x0})`)
                .on("click", (e, d) => {
                    if (!d.children && !d._children && d.data.url) { 
                        window.open(d.data.url, "_blank"); 
                    } else if (d.children || d._children) { 
                        toggle(d); 
                        update(d); 
                    }
                });

            nodeEnter.append("circle")
                .attr("r", 1e-6);

            nodeEnter.append("text")
                .attr("dy", ".35em")
                .attr("x", d => d.children || d._children ? -18 : 18)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .text(d => d.data.name)
                .style("fill-opacity", 1e-6);

            const nodeUpdate = nodeEnter.merge(node);
            nodeUpdate.transition()
                .duration(600)
                .attr("transform", d => `translate(${d.y},${d.x})`);

            nodeUpdate.select("circle")
                .attr("r", 10);

            nodeUpdate.select("text")
                .style("fill-opacity", 1)
                .attr("x", d => d.children || d._children ? -18 : 18)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start");
            
            const nodeExit = node.exit().transition()
                .duration(500)
                .attr("transform", d => `translate(${source.y},${source.x})`)
                .remove();

            nodeExit.select("circle").attr("r", 1e-6);
            nodeExit.select("text").style("fill-opacity", 1e-6);

            const link = g.selectAll("path.link").data(links, d => d.target.id);
            
            const linkEnter = link.enter().insert("path", "g")
                .attr("class", "link")
                .attr("d", d => diagonal({x: source.x0, y: source.y0}, {x: source.x0, y: source.y0}));

            const linkUpdate = linkEnter.merge(link);
            linkUpdate.transition()
                .duration(600)
                .attr("d", d => diagonal(d.source, d.target));

            link.exit().transition()
                .duration(500)
                .attr("d", d => diagonal({x: source.x, y: source.y}, {x: source.x, y: source.y}))
                .remove();

            nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
        }
    }
</script>
</body>
</html>
