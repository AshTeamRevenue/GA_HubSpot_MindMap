<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TeamRevenue - HubSpot Growth Architecture</title>
    
    <!-- HubSpot Usage Tracking Engine -->
    <script type="text/javascript" id="hs-script-loader" async defer src="//js.hs-scripts.com/6640927.js"></script>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230b1320%22 stroke=%22%2300bda5%22 stroke-width=%225%22/><text x=%2250%22 y=%2268%22 font-family=%22sans-serif%22 font-weight=%22bold%22 font-size=%2250%22 fill=%22%23ff7a59%22 text-anchor=%22middle%22>TR</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="data.js"></script>
    <style>
        :root { 
            --hs-orange: #ff7a59;
            --hs-orange-glow: rgba(255, 122, 89, 0.8);
            --tr-dark-bg: #0b1320; 
            --tr-teal: #00bda5;
            --tr-glass: rgba(11, 19, 32, 0.45);
            --tr-glass-border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif;
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(circle at 10% 20%, #15243b 0%, var(--tr-dark-bg) 90%);
            color: #ffffff;
        }

        .glass-header {
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 40px;
            background: var(--tr-glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--tr-glass-border);
            z-index: 10;
        }

        .header-title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(90deg, #ffffff, #a8b8d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        
        .header-subtitle {
            margin-left: 15px;
            padding-left: 15px;
            border-left: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
            color: #8fa0ba;
            text-transform: uppercase;
        }

        .search-container {
            margin-left: auto;
            position: relative;
        }

        #node-search {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--tr-glass-border);
            border-radius: 20px;
            padding: 8px 18px;
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            width: 300px;
            outline: none;
            transition: all 0.3s ease;
        }

        #node-search:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: var(--hs-orange);
            box-shadow: 0 0 12px var(--hs-orange-glow);
        }

        #canvas-wrapper {
            flex: 1; 
            width: 100%;
            position: relative;
        }

        #canvas { width: 100%; height: 100%; cursor: grab; }
        #canvas:active { cursor: grabbing; }
        
        #tooltip {
            position: absolute;
            background: rgba(11, 19, 32, 0.90);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--hs-orange);
            border-radius: 8px;
            padding: 14px 18px;
            color: #e1e7f0;
            font-size: 13px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 100;
            line-height: 1.5;
        }
        #tooltip strong {
            color: var(--hs-orange);
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
            font-weight: 600;
        }

        .node { cursor: pointer; }
        .node circle { 
            fill: var(--tr-dark-bg); 
            stroke: var(--hs-orange); 
            stroke-width: 3px; 
            transition: all 0.3s ease;
        }
        .node circle:hover { 
            fill: var(--hs-orange);
            filter: drop-shadow(0 0 8px var(--hs-orange-glow));
        }
        .node text { 
            font-size: 14px; 
            fill: #e1e7f0; 
            font-weight: 600; 
            pointer-events: none; 
        }
        .node--leaf text { 
            pointer-events: auto; 
            font-weight: 400;
            fill: #a2b2c9; 
            transition: all 0.2s ease;
        }
        .node--leaf text:hover { 
            fill: #ffffff; 
            text-shadow: 0 0 8px rgba(255,255,255,0.5);
        }
        .node--leaf circle {
            stroke: var(--tr-teal);
            stroke-width: 2.5px;
        }
        
        .link { 
            fill: none; 
            stroke: rgba(255,255,255,0.15); 
            stroke-width: 2px; 
            transition: stroke 0.3s ease;
        }
    </style>
</head>
<body>

<div class="glass-header">
    <h1 class="header-title">TeamRevenue</h1>
    <span class="header-subtitle">Growth Architect MindMap</span>
    
    <div class="search-container">
        <input type="text" id="node-search" placeholder="Search mind map (e.g. CPQ)..." autocomplete="off">
    </div>
</div>

<div id="canvas-wrapper">
    <div id="tooltip"></div>
    <svg id="canvas"></svg>
</div>

<script>
    if (typeof sheetData === 'undefined') {
        alert("CRITICAL ERROR: 'data.js' is missing! Please await completion of the GitHub python script.");
    } else {
        const rawData = d3.csvParse(sheetData.trim());
        const data = rawData.filter(d => d.Parent && d.Name);

        const svg = d3.select("#canvas");
        const g = svg.append("g");
        const wrapper = document.getElementById('canvas-wrapper');
        const tooltip = d3.select("#tooltip");
        
        const zoom = d3.zoom()
            .scaleExtent([0.1, 4])
            .on("zoom", (e) => g.attr("transform", e.transform));
        svg.call(zoom);

        const tree = d3.tree().nodeSize([50, 450]);
        let root;
        let i = 0; 

        const vpMapping = {
            "LEADERSHIP": ["Executive Strategy"],
            "REVOPS": ["Data Governance", "Revenue Insights", "Portal Health & Security"],
            "MARKETING": ["Marketing Leadership", "Frontline Managers", "Marketing Ops", "Demand Gen", "Content Execution"],
            "SALES": ["Sales Leadership", "Frontline Managers", "Sales Ops", "Field Sales (Outside)", "Inside Sales (SDR/BDR)", "Enablement"],
            "CUSTOMER SUCCESS": ["CS Leadership", "Frontline Managers", "Service Ops", "Agent Enablement", "Retention Strategy"]
        };

        const nestedData = { name: "HUBSPOT CORE", children: [] };
        Object.keys(vpMapping).forEach(vp => {
            const vpNode = { name: vp, children: [] };
            vpMapping[vp].forEach(dir => {
                const articles = data.filter(d => d.Parent === dir).map(d => ({ name: d.Name, url: d.URL, summary: d.Summary }));
                if (articles.length > 0) {
                    vpNode.children.push({ name: dir, children: articles });
                }
            });
            nestedData.children.push(vpNode);
        });

        root = d3.hierarchy(nestedData);
        root.x0 = wrapper.clientHeight / 2; 
        root.y0 = 0;

        function collapseDeep(d) {
            if (d.children) {
                d._children = d.children;
                d._children.forEach(collapseDeep);
                d.children = null;
            }
        }

        if (root.children) {
            root.children.forEach(collapseDeep);
        }

        update(root);
        
        const initialScale = 0.85;
        const startX = wrapper.clientWidth * 0.15; 
        const startY = wrapper.clientHeight / 2;
        svg.call(zoom.transform, d3.zoomIdentity.translate(startX, startY).scale(initialScale));

        function toggle(d) {
            if (d.children) { 
                d._children = d.children; 
                d.children = null; 
            } else { 
                d.children = d._children; 
                d._children = null; 
            }
        }

        function diagonal(s, d) {
            return `M ${d.y} ${d.x}
                    C ${(s.y + d.y) / 2} ${d.x},
                      ${(s.y + d.y) / 2} ${s.x},
                      ${s.y} ${s.x}`;
        }

        function update(source) {
            tree(root);
            const nodes = root.descendants();
            const links = root.links();

            const node = g.selectAll("g.node").data(nodes, d => d.id || (d.id = ++i));
            
            const nodeEnter = node.enter().append("g")
                .attr("class", d => "node" + (!d.children && !d._children && d.data.url ? " node--leaf" : ""))
                .attr("transform", d => `translate(${source.y0},${source.x0})`)
                .on("click", (e, d) => {
                    if (!d.children && !d._children && d.data.url) { 
                        // Ping HubSpot Analytics!
                        var _hsq = window._hsq = window._hsq || [];
                        _hsq.push(["trackEvent", { id: "Clicked MindMap Node", value: d.data.name }]);
                        window.open(d.data.url, "_blank"); 
                    } else if (d.children || d._children) { 
                        toggle(d); 
                        update(d); 
                    }
                })
                .on("mouseover", function(e, d) {
                    if (!d.children && !d._children && d.data.summary) {
                        d3.select(this).select("circle").style("filter", "drop-shadow(0 0 12px var(--tr-teal))");
                        tooltip.transition().duration(200).style("opacity", 1);
                        tooltip.html(`<strong>${d.data.name}</strong>${d.data.summary}`)
                            .style("left", (e.pageX + 25) + "px")
                            .style("top", (e.pageY - 40) + "px");
                    }
                })
                .on("mouseout", function(e, d) {
                    if (!d.children && !d._children && d.data.summary) {
                        d3.select(this).select("circle").style("filter", "none");
                        tooltip.transition().duration(300).style("opacity", 0);
                    }
                });

            nodeEnter.append("circle")
                .attr("r", 1e-6);

            nodeEnter.append("text")
                .attr("dy", ".35em")
                .attr("x", d => d.children || d._children ? -18 : 18)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start")
                .text(d => d.data.name)
                .style("fill-opacity", 1e-6);

            const nodeUpdate = nodeEnter.merge(node);
            nodeUpdate.transition()
                .duration(600)
                .attr("transform", d => `translate(${d.y},${d.x})`);

            nodeUpdate.select("circle")
                .attr("r", 10);

            nodeUpdate.select("text")
                .style("fill-opacity", 1)
                .attr("x", d => d.children || d._children ? -18 : 18)
                .attr("text-anchor", d => d.children || d._children ? "end" : "start");
            
            const nodeExit = node.exit().transition()
                .duration(500)
                .attr("transform", d => `translate(${source.y},${source.x})`)
                .remove();

            nodeExit.select("circle").attr("r", 1e-6);
            nodeExit.select("text").style("fill-opacity", 1e-6);

            const link = g.selectAll("path.link").data(links, d => d.target.id);
            
            const linkEnter = link.enter().insert("path", "g")
                .attr("class", "link")
                .attr("d", d => diagonal({x: source.x0, y: source.y0}, {x: source.x0, y: source.y0}));

            const linkUpdate = linkEnter.merge(link);
            linkUpdate.transition()
                .duration(600)
                .attr("d", d => diagonal(d.source, d.target));

            link.exit().transition()
                .duration(500)
                .attr("d", d => diagonal({x: source.x, y: source.y}, {x: source.x, y: source.y}))
                .remove();

            nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
        }

        // Live Deep Search Logic
        d3.select("#node-search").on("input", function() {
            const query = this.value.toLowerCase().trim();
            
            // Clean up old searches (Reset everything to default colors)
            svg.selectAll("circle").style("stroke", d => (!d.children && !d._children && d.data.url ? "var(--tr-teal)" : "var(--hs-orange)"));
            svg.selectAll("text").style("fill", d => (!d.children && !d._children && d.data.url ? "#a2b2c9" : "#e1e7f0")).style("font-weight", 600);
            svg.selectAll("circle").style("filter", "none");
            
            if (query === "") return;

            const matches = [];
            
            // 1. Custom recursive function to search expanded AND collapsed nodes
            function searchNodes(node) {
                if (node.data.name.toLowerCase().includes(query)) {
                    matches.push(node);
                }
                const children = node.children || node._children;
                if (children) {
                    children.forEach(searchNodes);
                }
            }
            
            searchNodes(root);

            if (matches.length > 0) {
                // 2. Expand all parents of the matched nodes
                matches.forEach(m => {
                    let current = m.parent;
                    while (current) {
                        if (current._children) {
                            current.children = current._children; // Expand it
                            current._children = null;
                        }
                        current = current.parent;
                    }
                });

                // 3. Force D3 to recalculate
                update(root);

                // 4. Ignite matches with neon yellow
                svg.selectAll("g.node")
                    .filter(d => matches.includes(d)) 
                    .select("circle")
                    .style("stroke", "#ffd700")  
                    .style("stroke-width", "4px")
                    .style("filter", "drop-shadow(0 0 10px #ffd700)");
                
                svg.selectAll("g.node")
                    .filter(d => matches.includes(d))
                    .select("text")
                    .style("fill", "#ffd700")
                    .style("font-weight", "800");
            }
        });
        
        // Prevent enter key from doing anything weird
        d3.select("#node-search").on("keydown", function(e) {
            if (e.key === "Enter" || e.keyCode === 13) {
                e.preventDefault();
            }
        });
    }
</script>
</body>
</html>
