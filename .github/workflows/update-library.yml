name: Weekly Knowledge Base Updater

on:
  schedule:
    - cron: '0 8 * * 1' # Runs every Monday at 8 AM UTC
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Needed to commit the updated files

jobs:
  update-library:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run mining script
      run: python generate_library.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add GA_Reference_Library_V2.csv data.js
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update library data" && git push)
