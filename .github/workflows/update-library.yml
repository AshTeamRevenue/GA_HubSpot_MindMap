name: Weekly Knowledge Base Updater

on:
  schedule:
    - cron: '0 8 * * 1' # Runs every Monday at 8 AM UTC
  workflow_dispatch:      # Allows manual trigger

jobs:
  update-library:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Forces modern Python to protect our UTC Timestamp

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install duckduckgo-search

      - name: Run mining script
        run: python generate_library.py

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.js GA_Reference_Library_V2.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update library data"
          git push
